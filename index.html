<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurelion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="game">
    <section id="screen">
      <div id="location">AURELION INDUSTRIES // Außenbereich</div>

      <div id="story">
        Lade System...
      </div>

      <div id="panels">
        <div>
          <h3>Befehle</h3>
          <ul id="commands"></ul>
        </div>

        <div>
          <h3>Inventar</h3>
          <ul id="inventory"></ul>
        </div>

        <div>
          <h3>Hotspots</h3>
          <ul id="hotspots"></ul>
        </div>
      </div>

      <form id="commandForm">
        <span>&gt;</span>
        <input id="commandInput" autocomplete="off" autofocus />
        <button type="submit">Senden</button>
      </form>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
